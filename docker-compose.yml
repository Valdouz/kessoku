# Lancement en une commande :  docker compose up -d --build
#   App + collaboratif  ->  http://localhost:8080
#   (nginx sert l'app ET proxifie le WebSocket /sync vers le service "sync")
# Un seul port à exposer (8080) -> idéal derrière un tunnel Cloudflare (wss://…/sync).
services:
  kessoku:
    build: .
    image: kessoku:latest
    container_name: kessoku
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # Backend : authentification (comptes SQLite) + synchro collaborative.
  # Interne au réseau Docker (nginx proxifie /api et /sync vers http://api:1234).
  # Données persistées dans le volume "kessoku-data" (SQLite + secret JWT).
  api:
    build:
      context: ./server
    image: kessoku-api:latest
    container_name: kessoku-api
    environment:
      - PORT=1234
      - DATA_DIR=/data
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      - kessoku-data:/data
    expose:
      - "1234"
    restart: unless-stopped

volumes:
  kessoku-data:
