# Lancement en une commande :  docker compose up -d --build
#   App + collaboratif  ->  http://localhost:8080
#   (nginx sert l'app ET proxifie le WebSocket /sync vers le service "sync")
# Un seul port à exposer (8080) -> idéal derrière un tunnel Cloudflare (wss://…/sync).
services:
  kessoku:
    build: .
    image: kessoku:latest
    container_name: kessoku
    ports:
      - "8080:80"
    depends_on:
      - sync
    restart: unless-stopped

  # Serveur de synchronisation collaborative (relais WebSocket, aucune donnée persistée).
  # Interne au réseau Docker : joignable par nginx via http://sync:1234, pas exposé à l'hôte.
  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    image: kessoku-sync:latest
    container_name: kessoku-sync
    expose:
      - "1234"
    restart: unless-stopped
