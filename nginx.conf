server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # En-têtes de sécurité (always = aussi sur les erreurs).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Backend (auth + synchro) -> conteneur "api". resolver + variable : nginx
    # démarre même si "api" n'est pas encore prêt.
    resolver 127.0.0.11 valid=30s;

    # API d'authentification (HTTP)
    location /api/ {
        set $api_upstream api:1234;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Synchro collaborative (WebSocket) — même domaine => compatible HTTPS / tunnel Cloudflare.
    location /sync {
        access_log off; # le token transite en query (?token=) : on évite de le journaliser
        set $sync_upstream api:1234;
        proxy_pass http://$sync_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA : tout retombe sur index.html (utile même avec HashRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets fingerprintés : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker & manifeste : jamais en cache (mises à jour immédiates)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }
}
