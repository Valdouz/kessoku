server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Synchro collaborative (WebSocket) -> conteneur "sync".
    # On passe par le même domaine => compatible HTTPS / tunnel Cloudflare (wss://…/sync).
    # resolver + variable : nginx démarre même si "sync" n'est pas encore prêt.
    location /sync {
        resolver 127.0.0.11 valid=30s;
        set $sync_upstream sync:1234;
        proxy_pass http://$sync_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA : tout retombe sur index.html (utile même avec HashRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets fingerprintés : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker & manifeste : jamais en cache (mises à jour immédiates)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }
}
